pre-commit:
  jobs:
    - run: pnpm fix {staged_files}
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      exclude:
        # Generated registry output and vendored recipe templates — never reformat.
        - "public/r/**"
        - "registry/eve/**"
        - "registry/flue/**"
      stage_fixed: true
